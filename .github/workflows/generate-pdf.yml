  name: Generate PDF from Technical Report                                                                                                                                                                      
                                                                                                                                                                                                                
  on:
    push:                                                                                                                                                                                                       
      branches: [main]                                                                                                                                                                                        
      paths:                                                                                                                                                                                                  
        - 'technical_report.md'
                                                                                                                                                                                                                
  jobs:
    build-pdf:                                                                                                                                                                                                  
      runs-on: ubuntu-latest                                                                                                                                                                                  
      permissions:                                                                                                                                                                                            
        contents: write

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4                                                                                                                                                                             
   
        - name: Install pandoc and LaTeX                                                                                                                                                                        
          run: |                                                                                                                                                                                              
            sudo apt-get update                                                                                                                                                                               
            sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended                                                                                                                         
   
        - name: Generate PDF                                                                                                                                                                                    
          run: pandoc technical_report.md -o technical_report.pdf                                                                                                                                             
                                                                                                                                                                                                                
        - name: Commit and push PDF
          run: |                                                                                                                                                                                                
            git config user.name "github-actions[bot]"                                                                                                                                                        
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add technical_report.pdf                                                                                                                                                                        
            git diff --cached --quiet || git commit -m "Auto-generate technical_report.pdf"
            git push                      
